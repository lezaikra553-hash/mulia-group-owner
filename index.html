<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{--nav:#07162e;--blue:#2563eb;--bg:#f2f5fa;--line:#dce4ef;--muted:#64748b;--ok:#059669;--warn:#d97706;--bad:#dc2626}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,system-ui,sans-serif;color:#172033}header{position:sticky;top:0;z-index:20;background:var(--nav);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:9px;box-shadow:0 5px 20px #0003}.brand{margin-right:auto}.brand b{font-size:20px}.brand small{display:block;color:#bac8dc;margin-top:3px}
button,select,input{font:inherit}.btn{border:0;border-radius:10px;padding:10px 12px;font-weight:800;cursor:pointer}.blue{background:var(--blue);color:#fff}.green{background:var(--ok);color:#fff}.light{background:#fff;color:#21304a;border:1px solid #cbd5e1}.status{font-size:11px;color:#cbd5e1}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#ef4444;margin-right:5px}.dot.on{background:#22c55e}
main{max-width:1500px;margin:auto;padding:20px}.hero{background:linear-gradient(135deg,#fff,#e7efff);border:1px solid #cbdcf8;border-radius:20px;padding:22px;display:flex;justify-content:space-between;gap:18px;align-items:center}.hero h1{margin:0 0 7px}.hero p{margin:0;color:var(--muted)}.filters{display:flex;gap:8px;flex-wrap:wrap}.filters select{padding:10px;border:1px solid #cbd5e1;border-radius:10px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-top:13px}.card{background:#fff;border:1px solid var(--line);border-radius:17px;padding:16px;box-shadow:0 8px 24px #0f172a0d}.metric{border-left:4px solid var(--blue);min-height:102px}
.metric small{display:block}

.pipeBox b{display:block;font-size:20px;margin-top:4px;color:#1d4ed8}
.ownerGrid{display:grid;grid-template-columns:2fr 1fr;gap:13px;margin-top:13px}
.ownerAlert{background:#fff;border:1px solid var(--line);border-radius:17px;padding:16px;box-shadow:0 8px 24px #0f172a0d}
.alertItem{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px dashed #dbe3ef}
.alertItem:last-child{border-bottom:0}
@media(max-width:900px){.pipelineGrid{grid-template-columns:repeat(3,1fr)}.ownerGrid{grid-template-columns:1fr}}
@media(max-width:600px){.pipelineGrid{grid-template-columns:repeat(2,1fr)}}.metric small{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase}.metric strong{display:block;font-size:25px;margin-top:7px}.metric em{font-style:normal;color:#94a3b8;font-size:11px}
.companyGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-top:13px}.company h3{margin:0 0 10px}.row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px dashed #dbe3ef}.row:last-child{border:0}.two{display:grid;grid-template-columns:1fr;gap:13px;margin-top:13px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px}.tab{border:1px solid #cbd5e1;background:#fff;border-radius:9px;padding:9px 12px;font-weight:800;cursor:pointer}.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #e5ebf3;text-align:left;font-size:12px;vertical-align:top}th{background:#f8fafc}.num{text-align:right}.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#e2e8f0;font-size:10px;font-weight:900}.badge.ok{background:#dcfce7;color:#047857}.badge.warn{background:#fef3c7;color:#92400e}.badge.bad{background:#fee2e2;color:#b91c1c}.ok{color:var(--ok)}.bad{color:var(--bad)}.input{width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:8px}.notice{padding:12px;border-radius:10px;background:#fff7ed;color:#9a3412;font-size:12px;line-height:1.5}.goodnote{background:#ecfdf5;color:#047857}.footer{text-align:center;padding:24px;color:#94a3b8;font-size:11px}.mono{font-family:Consolas,monospace;font-size:11px;white-space:pre-wrap;background:#0f172a;color:#dbeafe;padding:12px;border-radius:10px;max-height:260px;overflow:auto}.authMsg{display:none;max-width:1500px;margin:12px auto 0;padding:11px 14px;border-radius:10px;font-size:12px;font-weight:800}.authMsg.show{display:block}.authMsg.ok{background:#dcfce7;color:#047857;border:1px solid #86efac}.authMsg.err{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}.authMsg.info{background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd}
@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}.companyGrid,.two{grid-template-columns:1fr}}@media(max-width:600px){header{flex-wrap:wrap}.brand{width:100%}.grid{grid-template-columns:1fr}main{padding:11px}.hero{flex-direction:column;align-items:flex-start}}@media print{header,.filters,.tabs,.noPrint{display:none!important}body{background:#fff}.card,.hero{box-shadow:none;break-inside:avoid}main{padding:0}}
</style></head><body>
<header><div class="brand"><b>MULIA GROUP</b><small>Owner & Investor Dashboard V4 • Validated Reader</small></div><button class="btn green" onclick="loginGoogle()">🔐 Login Google</button><button class="btn blue" onclick="syncAll()">☁ Ambil Data 3 Usaha</button><button class="btn light" onclick="window.print()">🖨 Print</button><span class="status"><span id="dot" class="dot"></span><span id="gstat">Google belum login</span></span></header><div id="authMsg" class="authMsg"></div>
<main><section class="hero"><div><h1>Dashboard Global Mulia Group</h1><p>Ringkasan tiga usaha: Berkah Mulia, Dwi Mulia Advertising, dan Azkia Mulia Perada.</p></div><div class="filters"><label style="font-size:11px;font-weight:900;color:#475569">Periode<br><select id="period" onchange="render()"></select></label><label style="font-size:11px;font-weight:900;color:#475569">Perusahaan<br><select id="scope" onchange="render()"><option value="ALL">Mulia Group</option><option value="BM">Berkah Mulia</option><option value="DM">Dwi Mulia Advertising</option><option value="AP">Azkia Mulia Perada</option></select></label></div></section>
<div id="metrics" class="grid"></div><div id="companies" class="companyGrid"></div><div id="globalExtra" class="globalPanel"></div>
<div style="margin-top:13px"><section class="card"><div class="tabs"><button class="tab active" onclick="showTab('profit',this)">Pembagian Hasil</button><button class="tab" onclick="showTab('monthly',this)">Rekap Bulanan</button><button class="tab" onclick="showTab('invoice',this)">Invoice</button><button class="tab" onclick="showTab('audit',this)">Audit Akurasi</button><button class="tab" onclick="showTab('investor',this)">Investor</button></div>
<div id="tab-profit"></div><div id="tab-monthly" style="display:none"></div><div id="tab-invoice" style="display:none"></div><div id="tab-audit" style="display:none"></div><div id="tab-investor" style="display:none"></div></section></div>
<div class="footer">Mulia Group Owner Dashboard V4 • Tidak mengubah data aplikasi sumber</div></main>
<script>
const CLIENT_ID = "169606052820-5ij848mubicfdppo5b2g5qpaub67munt.apps.googleusercontent.com";
const GOOGLE_SCOPE = "https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email";
const C={BM:{name:"Berkah Mulia",file:"berkah_mulia_BM_sync_latest.json",sales:"BM_SALES_DB_V1",kas:["BM_KAS_BESAR_ACTIVE_DB","BM_KAS_V8_ENTERPRISE"]},DM:{name:"Dwi Mulia Advertising",file:"dwi_mulia_portal_sync_latest.json",sales:"DMA_SALES_DB_V1",kas:["DMA_KAS_BESAR_ACTIVE_DB","dwiMuliaKas_V8_ENTERPRISE"]},AP:{name:"Azkia Mulia Perada",file:"azkia_mulia_AP_sync_latest.json",sales:"AP_SALES_DB_V1",kas:["AP_KAS_BESAR_ACTIVE_DB","AP_KAS_V8_ENTERPRISE"]}};
const periods=[["ALL","Semua Periode"],["februari","Februari 2026"],["maret","Maret 2026"],["april","April 2026"],["mei","Mei 2026"],["juni","Juni 2026"],["juli","Juli 2026"],["agustus","Agustus 2026"],["september","September 2026"],["oktober","Oktober 2026"],["november","November 2026"],["desember","Desember 2026"],["januari","Januari 2027"]];
const $=id=>document.getElementById(id);
let token=sessionStorage.getItem("OWNER_GOOGLE_TOKEN")||"",raw={},tokenClient=null,loginBusy=false;
let investors=JSON.parse(localStorage.getItem("MULIA_INVESTORS_V4")||'{"BM":[{"name":"Abdul Aziz","pct":60},{"name":"Sentot","pct":10},{"name":"Tabungan Bersama","pct":30}],"DM":[{"name":"Dwita Hayani","pct":100}],"AP":[{"name":"Ade Indra","pct":100}]}');
const rp=n=>"Rp "+Math.round(Number(n||0)).toLocaleString("id-ID"),num=v=>Number.isFinite(Number(v))?Number(v):0,parse=(v,f={})=>{try{return typeof v==="string"?JSON.parse(v):v||f}catch{return f}};
function msg(text,type="info"){const el=$("authMsg");el.textContent=text;el.className="authMsg show "+type;if(type==="ok")setTimeout(()=>{el.className="authMsg"},4500)}
function init(){
  const p=$("period"); p.innerHTML=""; periods.forEach(x=>p.add(new Option(x[1],x[0]))); p.value="juli";
  Object.keys(C).forEach(c=>{const x=localStorage.getItem("OWNER_RAW_V4_"+c);if(x)raw[c]=parse(x,{})});
  updateStatus(); render(); waitGoogleReady();
}
function waitGoogleReady(){
  let tries=0; const timer=setInterval(()=>{tries++; if(window.google?.accounts?.oauth2){clearInterval(timer);buildTokenClient();}else if(tries>=30){clearInterval(timer);msg("Layanan Google gagal dimuat. Periksa internet lalu tekan Ctrl+F5.","err")}},300)
}
function buildTokenClient(){
  try{
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,
      scope:GOOGLE_SCOPE,
      include_granted_scopes:true,
      callback:handleTokenResponse,
      error_callback:e=>{loginBusy=false;msg("Login Google gagal: "+(e?.type||e?.message||"popup ditutup atau diblokir browser"),"err")}
    });
  }catch(e){msg("Google OAuth tidak dapat dimulai: "+e.message,"err")}
}
function handleTokenResponse(r){
  loginBusy=false;
  if(!r||r.error){msg("Login Google ditolak: "+(r?.error_description||r?.error||"tidak diketahui"),"err");return}
  token=r.access_token||"";
  if(!token){msg("Token Google tidak diterima.","err");return}
  sessionStorage.setItem("OWNER_GOOGLE_TOKEN",token);updateStatus();msg("Login Google berhasil. Mengambil data tiga usaha…","ok");syncAll(true)
}
function loginGoogle(){
  if(loginBusy)return;
  if(!location.protocol.startsWith("http")){msg("Login Google hanya dapat dipakai dari domain HTTPS, bukan file lokal.","err");return}
  if(!window.google?.accounts?.oauth2){msg("Layanan Google belum siap. Tunggu 2–3 detik lalu coba lagi.","err");waitGoogleReady();return}
  if(!tokenClient)buildTokenClient(); if(!tokenClient)return;
  loginBusy=true; msg("Membuka jendela login Google…","info");
  try{tokenClient.requestAccessToken({prompt:token?"":"select_account"})}catch(e){loginBusy=false;msg("Tidak bisa membuka login Google: "+e.message,"err")}
}
function updateStatus(){const d=$("dot"),s=$("gstat");d.classList.toggle("on",!!token);s.textContent=token?"Google terhubung":"Google belum login"}
function storage(c){return raw[c]?.storage||{}}function get(c,key,f={}){const v=storage(c)[key];return v==null?f:parse(v,f)}function kas(c){for(const k of C[c].kas){const v=storage(c)[k];if(v!=null)return parse(v,{})}return{}}function sales(c){return get(c,C[c].sales,{quotes:[],invoices:[]})}
function calcDoc(d){const sub=(d?.items||[]).reduce((s,x)=>s+num(x.qty)*num(x.price),0),pct=num(d?.ppnPct),mode=String(d?.ppnMode||"none");return mode==="exclusive"?sub+Math.round(sub*pct/100):sub}
function docPaid(d,total){const st=String(d?.status||"").trim().toUpperCase();if(st==="LUNAS"||(st.includes("LUNAS")&&!st.includes("BELUM")))return total;const explicit=num(d?.totalPaid??d?.paid);if(explicit>0)return explicit;if(Array.isArray(d?.pembayaran))return d.pembayaran.reduce((s,x)=>s+num(x?.amount??x?.nominal??x?.value),0);return num(d?.dp)}
function docOut(d){const t=calcDoc(d),st=String(d?.status||"").trim().toUpperCase();if(st==="LUNAS"||(st.includes("LUNAS")&&!st.includes("BELUM")))return 0;const e=num(d?.outstanding??d?.sisaPiutang);return e>0?e:Math.max(t-docPaid(d,t),0)}
function invDate(d){const s=String(d?.date||"").trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s+"T00:00:00");const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);return m?new Date(+m[3],+m[2]-1,+m[1]):null}
function periodForDate(d){if(!d)return null;const n=d.getMonth()+1,y=d.getFullYear();for(const [k] of periods.slice(1)){const mm={januari:1,februari:2,maret:3,april:4,mei:5,juni:6,juli:7,agustus:8,september:9,oktober:10,november:11,desember:12}[k],yy=k==="januari"?2027:2026;if(mm===n&&yy===y)return k}return null}
function monthData(c,key){const k=kas(c),r=k.rekap?.[key]||{},t=k.transactions?.[key]||{};let inc=num(r.pemasukanReal),op=num(r.operasionalReal),indra=num(r.indraReal),andre=num(r.andreReal),exp=num(r.pengeluaranReal),profit=num(r.labaRugiReal);if(!inc&&!exp&&!profit){inc=(t.pemasukan||[]).reduce((s,x)=>s+num(x.amount),0);op=(t.operasional||[]).reduce((s,x)=>s+num(x.amount),0);indra=(t.indra||[]).reduce((s,x)=>s+num(x.amount),0);andre=(t.andre||[]).reduce((s,x)=>s+num(x.amount),0);exp=op+indra+andre;profit=inc-exp}return{inc,op,indra,andre,exp,profit,bagi:k.bagi?.[key]||{}}}
function company(c){const p=$("period").value,k=kas(c),keys=p==="ALL"?periods.slice(1).map(x=>x[0]):[p],ms=keys.map(x=>monthData(c,x)),inc=ms.reduce((s,x)=>s+x.inc,0),exp=ms.reduce((s,x)=>s+x.exp,0),profit=ms.reduce((s,x)=>s+x.profit,0),db=sales(c),allInv=Array.isArray(db.invoices)?db.invoices:[],inv=p==="ALL"?allInv:allInv.filter(x=>periodForDate(invDate(x))===p),iv=inv.reduce((s,x)=>s+calcDoc(x),0),paid=inv.reduce((s,x)=>s+docPaid(x,calcDoc(x)),0),out=inv.reduce((s,x)=>s+docOut(x),0);return{c,name:C[c].name,k,ms,inc,exp,profit,inv,iv,paid,out,loaded:!!raw[c],summary:k.summaryCalc||{},summaryRaw:k.summary||{},modified:raw[c]?._modified ?? null}}
async function apiFetch(url){const r=await fetch(url,{headers:{Authorization:"Bearer "+token}});if(r.status===401){token="";sessionStorage.removeItem("OWNER_GOOGLE_TOKEN");updateStatus();throw Error("Sesi Google berakhir. Silakan login ulang.")}let j;try{j=await r.json()}catch{j={}}if(!r.ok)throw Error(j.error?.message||("HTTP "+r.status));return j}
async function fetchFile(name){const q=encodeURIComponent(`name='${name}' and trashed=false`),j=await apiFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc&pageSize=10`);if(!j.files?.length)return null;const f=j.files[0],p=await apiFetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`);p._modified=f.modifiedTime;return p}
async function syncAll(fromLogin=false){if(!token){loginGoogle();return}msg("Mengambil backup terbaru dari Google Drive…","info");const errors=[];for(const c of Object.keys(C)){try{const p=await fetchFile(C[c].file);if(!p){errors.push(C[c].name+": file tidak ditemukan");continue}raw[c]=p;localStorage.setItem("OWNER_RAW_V4_"+c,JSON.stringify(p))}catch(e){errors.push(C[c].name+": "+e.message)}}render();if(errors.length)msg("Sinkronisasi selesai dengan catatan: "+errors.join(" | "),"err");else msg("Data Berkah, Dwi, dan Azkia berhasil diperbarui.","ok")}

function docsForScope(){
  const cs=scope.value==="ALL"?Object.keys(C):[scope.value], rows=[];
  cs.forEach(c=>{
    const db=sales(c);
    (db.quotes||[]).forEach(x=>rows.push({c,type:"quote",status:String(x.status||"").toUpperCase(),value:calcDoc(x),customer:x.customer||"",date:invDate(x)}));
    (db.invoices||[]).forEach(x=>rows.push({c,type:"invoice",status:String(x.status||"").toUpperCase(),value:calcDoc(x),customer:x.customer||"",date:invDate(x)}));
  });
  if(period.value!=="ALL") return rows.filter(x=>periodForDate(x.date)===period.value);
  return rows;
}
function renderGlobalExtra(){
  const cs=scope.value==="ALL"?Object.keys(C):[scope.value];
  const comps=cs.map(company);
  const dbRows=[];
  cs.forEach(c=>{
    const db=sales(c), qs=Array.isArray(db.quotes)?db.quotes:[], ivs=Array.isArray(db.invoices)?db.invoices:[];
    qs.forEach(x=>dbRows.push({c,type:"quote",doc:x}));
    ivs.forEach(x=>dbRows.push({c,type:"invoice",doc:x}));
  });
  const filtered=period.value==="ALL"?dbRows:dbRows.filter(r=>periodForDate(invDate(r.doc))===period.value);
  const quotes=filtered.filter(r=>r.type==="quote");
  const invs=filtered.filter(r=>r.type==="invoice");
  const customers=new Set(filtered.map(r=>String(r.doc.customer||"").trim().split("\n")[0]).filter(Boolean));
  const nilaiPenawaran=quotes.reduce((s,r)=>s+calcDoc(r.doc),0);
  const nilaiInvoice=invs.reduce((s,r)=>s+calcDoc(r.doc),0);
  const terbayar=invs.reduce((s,r)=>s+docPaid(r.doc,calcDoc(r.doc)),0);
  const piutang=invs.reduce((s,r)=>s+docOut(r.doc),0);
  const lunas=invs.filter(r=>String(r.doc.status||"").toUpperCase()==="LUNAS").length;
  const dp=invs.filter(r=>/DP|SEBAGIAN/.test(String(r.doc.status||"").toUpperCase())||docPaid(r.doc,calcDoc(r.doc))>0&&docOut(r.doc)>0).length;
  const belum=invs.filter(r=>docPaid(r.doc,calcDoc(r.doc))===0&&docOut(r.doc)>0).length;
  const cashIn=comps.reduce((s,x)=>s+x.inc,0),cashOut=comps.reduce((s,x)=>s+x.exp,0),profit=comps.reduce((s,x)=>s+x.profit,0);
  const scopeLabel=scope.options[scope.selectedIndex]?.text||"Mulia Group";
  const periodLabel=period.options[period.selectedIndex]?.text||"Semua Periode";
  globalExtra.innerHTML=`
  <div class="globalSection"><h3>Dashboard ${scopeLabel} • ${periodLabel}</h3>
    <div class="grid" style="margin-top:0">
      <div class="card metric"><small>Penawaran</small><strong>${quotes.length}</strong><div class="sub">Dokumen penawaran</div></div>
      <div class="card metric"><small>Nilai Penawaran</small><strong>${rp(nilaiPenawaran)}</strong><div class="sub">Total penawaran periode</div></div>
      <div class="card metric"><small>Invoice</small><strong>${invs.length}</strong><div class="sub">Dokumen invoice</div></div>
      <div class="card metric"><small>Nilai Invoice</small><strong>${rp(nilaiInvoice)}</strong><div class="sub">Total invoice periode</div></div>
      <div class="card metric"><small>Customer</small><strong>${customers.size}</strong><div class="sub">Customer unik</div></div>
      <div class="card metric"><small>Terbayar</small><strong>${rp(terbayar)}</strong><div class="sub">Pembayaran tercatat</div></div>
      <div class="card metric"><small>Piutang Invoice</small><strong>${rp(piutang)}</strong><div class="sub">Sisa belum dibayar</div></div>
      <div class="card metric"><small>Laba/Rugi Kas</small><strong class="${profit>=0?"ok":"bad"}">${rp(profit)}</strong><div class="sub">Rekap Kas Besar</div></div>
    </div>
  </div>
  <div class="ownerGrid">
    <div class="globalSection"><h3>Status Invoice</h3>
      <div class="pipelineGrid">
        <div class="pipeBox"><small>Belum Bayar</small><b>${belum}</b></div>
        <div class="pipeBox"><small>DP/Sebagian</small><b>${dp}</b></div>
        <div class="pipeBox"><small>Lunas</small><b>${lunas}</b></div>
        <div class="pipeBox"><small>Total Invoice</small><b>${invs.length}</b></div>
        <div class="pipeBox"><small>Kas Masuk</small><b style="font-size:14px">${rp(cashIn)}</b></div>
        <div class="pipeBox"><small>Kas Keluar</small><b style="font-size:14px">${rp(cashOut)}</b></div>
        <div class="pipeBox"><small>Usaha</small><b>${cs.length}</b></div>
      </div>
    </div>
    <div class="ownerAlert"><h3>Perhatian Owner</h3>
      <div class="alertItem"><span>Invoice belum bayar</span><b>${belum}</b></div>
      <div class="alertItem"><span>Invoice DP/sebagian</span><b>${dp}</b></div>
      <div class="alertItem"><span>Piutang invoice</span><b>${rp(piutang)}</b></div>
      <div class="alertItem"><span>Laba/rugi periode</span><b class="${profit>=0?"ok":"bad"}">${rp(profit)}</b></div>
    </div>
  </div>`;
}

function render(){const companyScope=$("scope").value,cs=companyScope==="ALL"?Object.keys(C):[companyScope],rs=cs.map(company),sum=k=>rs.reduce((s,x)=>s+x[k],0);$("metrics").innerHTML=[["Pemasukan Kas",sum("inc"),"Rekap resmi Kas Besar"],["Pengeluaran",sum("exp"),"Operasional + borongan"],["Laba/Rugi",sum("profit"),"Rekap resmi per bulan"],["Nilai Invoice",sum("iv"),"Dokumen invoice periode"],["Terbayar",sum("paid"),"DP/pembayaran tercatat"],["Piutang Invoice",sum("out"),"Belum lunas"],["Piutang Kas",rs.reduce((s,x)=>s+num(x.summary.piutangTotal),0),"Daftar piutang Kas Besar"],["Stok Bahan",rs.reduce((s,x)=>s+num(x.summary.stockTotal),0),"Nilai persediaan"]].map(x=>`<div class="card metric"><small>${x[0]}</small><strong>${rp(x[1])}</strong><em>${x[2]}</em></div>`).join("");$("companies").innerHTML=Object.keys(C).map(c=>{const x=company(c);return `<div class="card company"><h3>${x.name}</h3><div class="row"><span>Pemasukan</span><b>${rp(x.inc)}</b></div><div class="row"><span>Pengeluaran</span><b>${rp(x.exp)}</b></div><div class="row"><span>Laba/Rugi</span><b class="${x.profit>=0?"ok":"bad"}">${rp(x.profit)}</b></div><div class="row"><span>Invoice</span><b>${rp(x.iv)}</b></div><div class="row"><span>Piutang invoice</span><b>${rp(x.out)}</b></div><div class="row"><span>Status data</span><span class="badge ${x.loaded?"ok":"bad"}">${x.loaded?"Terbaca":"Belum terbaca"}</span></div></div>`}).join("");renderGlobalExtra();renderProfit();renderMonthly();renderInvoice();renderAudit();renderInvestors()}
function renderProfit(){
  const el=$("tab-profit"),p=$("period").value,label=periods.find(x=>x[0]===p)?.[1]||"Semua Periode";
  const monthOrder=periods.slice(1).map(x=>x[0]);
  const selectedIndex=p==="ALL"?monthOrder.length-1:monthOrder.indexOf(p);

  el.innerHTML=Object.keys(C).map(c=>{
    const x=company(c),list=investors[c]||[],tot=list.reduce((s,i)=>s+num(i.pct),0);

    if(c==="BM"){
      const current=p==="ALL"?null:monthData(c,p);

      // Akumulasi resmi per bulan untuk tabel Bagi Hasil & Tabungan.
      const detailKeys=monthOrder.filter((k,i)=>i>=monthOrder.indexOf("april") && i<=selectedIndex);
      const detail=detailKeys.map(k=>{
        const m=monthData(c,k),lbl=periods.find(z=>z[0]===k)?.[1]||k;
        return {k,lbl,...m,kas:num(m.bagi?.kas30),sentot:num(m.bagi?.sentot10),aziz:num(m.bagi?.aziz60)};
      }).filter(m=>m.inc!==0||m.exp!==0||m.profit!==0||m.kas!==0||m.sentot!==0||m.aziz!==0);

      const totals=detail.reduce((a,m)=>{
        a.profit+=m.profit;a.kas+=m.kas;a.sentot+=m.sentot;a.aziz+=m.aziz;return a;
      },{profit:0,kas:0,sentot:0,aziz:0});

      // TOP TABLE = hak bulan terpilih saja, bukan akumulasi.
      let monthRights={kas:0,sentot:0,aziz:0};
      if(current){
        monthRights={
          kas:num(current.bagi?.kas30),
          sentot:num(current.bagi?.sentot10),
          aziz:num(current.bagi?.aziz60)
        };
      }else{
        monthRights={kas:totals.kas,sentot:totals.sentot,aziz:totals.aziz};
      }

      const rows=list.map(i=>{
        let val=0;
        if(/sentot/i.test(i.name)) val=monthRights.sentot;
        else if(/tabungan|kas/i.test(i.name)) val=monthRights.kas;
        else if(/aziz/i.test(i.name)) val=monthRights.aziz;
        return `<tr><td>${i.name}</td><td class="num">${i.pct}%</td><td class="num"><b>${rp(val)}</b></td></tr>`;
      }).join("");

      let periodBox="";
      if(current){
        const dataDate=x.modified?new Date(x.modified).toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"}):"24 Juli 2026";
        const rightsTotal=monthRights.kas+monthRights.sentot+monthRights.aziz;
        const status=current.profit>0 && rightsTotal>0
          ? `Hak bagi hasil ${label}: Kas ${rp(monthRights.kas)}, Sentot ${rp(monthRights.sentot)}, Abdul Aziz ${rp(monthRights.aziz)}.`
          : current.profit<0
            ? `Periode ${label} masih rugi ${rp(Math.abs(current.profit))}. Hak bagi hasil bulan ini Rp0.`
            : `Belum ada hak bagi hasil pada ${label}.`;
        periodBox=`<div class="${current.profit>0&&rightsTotal>0?"notice goodnote":"notice"}" style="margin-bottom:12px">
          <b>PERIODE ${label.toUpperCase()}</b> • Data s.d. ${dataDate}<br>
          Pemasukan ${rp(current.inc)} • Pengeluaran ${rp(current.exp)} •
          Laba/Rugi <b class="${current.profit>=0?"ok":"bad"}">${rp(current.profit)}</b><br>${status}
        </div>`;
      }else{
        periodBox=`<div class="notice goodnote" style="margin-bottom:12px">
          <b>SEMUA PERIODE</b> • Tabel atas menampilkan akumulasi hak resmi sampai periode terakhir.
        </div>`;
      }

      const detailRows=detail.map(m=>`<tr>
        <td><b>${m.lbl}</b></td>
        <td class="num"><b class="${m.profit>=0?"ok":"bad"}">${rp(m.profit)}</b></td>
        <td class="num">${rp(m.kas)}</td>
        <td class="num">${rp(m.sentot)}</td>
        <td class="num">${rp(m.aziz)}</td>
      </tr>`).join("")||'<tr><td colspan="5">Belum ada data pembagian hasil.</td></tr>';

      return `<h3>${x.name} <span class="badge ${tot===100?"ok":"warn"}">${tot}%</span></h3>
        ${periodBox}
        <table><thead><tr><th>Investor</th><th class="num">Persentase</th><th class="num">${p==="ALL"?"Akumulasi Hak":"Hak "+label}</th></tr></thead>
        <tbody>${rows}</tbody></table>
        <h3 style="margin-top:22px">Bagi Hasil & Tabungan</h3>
        <div class="notice" style="margin-bottom:10px">Rincian resmi per bulan. Kerugian Juli tidak menghapus hak April–Juni yang sudah terbentuk.</div>
        <div style="overflow:auto"><table>
          <thead><tr><th>Bulan</th><th class="num">Laba/Rugi</th><th class="num">30% Kas</th><th class="num">10% Sentot</th><th class="num">60% Aziz</th></tr></thead>
          <tbody>${detailRows}
          <tr style="background:#fff7ed"><td><b>TOTAL</b></td><td class="num"><b>${rp(totals.profit)}</b></td><td class="num"><b>${rp(totals.kas)}</b></td><td class="num"><b>${rp(totals.sentot)}</b></td><td class="num"><b>${rp(totals.aziz)}</b></td></tr>
          </tbody>
        </table></div>`;
    }

    // Dwi dan Azkia: hak per bulan terpilih, bukan akumulasi.
    const currentProfit=x.profit;
    const rows=list.map(i=>{
      const val=currentProfit>0?currentProfit*num(i.pct)/100:0;
      return `<tr><td>${i.name}</td><td class="num">${i.pct}%</td><td class="num"><b>${rp(val)}</b></td></tr>`;
    }).join("");
    const note=currentProfit>0
      ? `Hak bagi hasil ${label} dihitung dari laba bersih ${rp(currentProfit)}.`
      : `Tidak ada pembagian hasil untuk ${label} karena laba bersih tidak positif.`;
    return `<h3>${x.name} <span class="badge ${tot===100?"ok":"warn"}">${tot}%</span></h3>
      <div class="${currentProfit>0?"notice goodnote":"notice"}">${note}</div>
      <table><thead><tr><th>Investor</th><th class="num">Persentase</th><th class="num">Hak ${label}</th></tr></thead><tbody>${rows}</tbody></table>`;
  }).join("");
}
function renderMonthly(){const p=$("period").value;$("tab-monthly").innerHTML=Object.keys(C).map(c=>{const x=company(c),keys=p==="ALL"?periods.slice(1):periods.filter(q=>q[0]===p);return `<h3>${x.name}</h3><table><thead><tr><th>Periode</th><th class="num">Pemasukan</th><th class="num">Operasional</th><th class="num">Indra</th><th class="num">Andre</th><th class="num">Pengeluaran</th><th class="num">Laba/Rugi</th></tr></thead><tbody>${keys.map(([k,l])=>{const m=monthData(c,k);return `<tr><td>${l}</td><td class="num">${rp(m.inc)}</td><td class="num">${rp(m.op)}</td><td class="num">${rp(m.indra)}</td><td class="num">${rp(m.andre)}</td><td class="num">${rp(m.exp)}</td><td class="num"><b>${rp(m.profit)}</b></td></tr>`}).join("")}</tbody></table>`}).join("")}
function renderInvoice(){const rows=[];Object.keys(C).forEach(c=>company(c).inv.forEach(x=>rows.push({c,date:invDate(x),no:x.no||"-",customer:String(x.customer||"-").split("\n")[0],total:calcDoc(x),paid:docPaid(x,calcDoc(x)),out:docOut(x),status:x.status||"-"})));$("tab-invoice").innerHTML=`<table><thead><tr><th>Usaha</th><th>Tanggal</th><th>No.</th><th>Customer</th><th class="num">Total</th><th class="num">Terbayar</th><th class="num">Piutang</th><th>Status</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${x.c}</td><td>${x.date?x.date.toLocaleDateString("id-ID"):"-"}</td><td>${x.no}</td><td>${x.customer}</td><td class="num">${rp(x.total)}</td><td class="num">${rp(x.paid)}</td><td class="num">${rp(x.out)}</td><td>${x.status}</td></tr>`).join("")||'<tr><td colspan="8">Tidak ada invoice pada periode terpilih.</td></tr>'}</tbody></table>`}
function renderAudit(){const p=$("period").value;$("tab-audit").innerHTML=Object.keys(C).map(c=>{const x=company(c),st=storage(c),issues=[];if(!x.loaded)issues.push("Backup Drive belum terbaca");if(!st[C[c].sales])issues.push("Database sales tidak ditemukan: "+C[c].sales);if(!C[c].kas.some(k=>st[k]))issues.push("Database Kas Besar tidak ditemukan");const undated=(sales(c).invoices||[]).filter(i=>!invDate(i)).length;if(undated)issues.push(undated+" invoice memiliki tanggal yang tidak bisa dibaca");if(x.k.summaryCalc&&p==="ALL"){const calc=periods.slice(1).reduce((a,[k])=>{const m=monthData(c,k);a.i+=m.inc;a.e+=m.exp;return a},{i:0,e:0});if(Math.abs(calc.i-num(x.k.summaryCalc.totalIncome))>1)issues.push("Total pemasukan bulanan berbeda dengan summaryCalc sebesar "+rp(calc.i-num(x.k.summaryCalc.totalIncome)));if(Math.abs(calc.e-num(x.k.summaryCalc.totalExpense))>1)issues.push("Total pengeluaran bulanan berbeda dengan summaryCalc sebesar "+rp(calc.e-num(x.k.summaryCalc.totalExpense)))}return `<h3>${x.name}</h3><div class="row"><span>File Drive</span><b>${C[c].file}</b></div><div class="row"><span>Update terakhir</span><b>${x.modified?new Date(x.modified).toLocaleString("id-ID"):"-"}</b></div>${issues.length?issues.map(i=>`<div class="notice" style="margin-top:7px">${i}</div>`).join(""):'<div class="notice goodnote" style="margin-top:7px">Struktur utama dan total rekap berhasil divalidasi.</div>'}<details><summary>Kunci data tersedia</summary><div class="mono">${Object.keys(st).sort().join("\n")||"Belum ada data"}</div></details>`}).join("")}
function renderInvestors(){$("tab-investor").innerHTML=Object.keys(C).map(c=>`<h3>${C[c].name}</h3><table><thead><tr><th>Nama</th><th>%</th><th></th></tr></thead><tbody>${(investors[c]||[]).map((x,i)=>`<tr><td><input class="input" value="${x.name}" onchange="editInv('${c}',${i},'name',this.value)"></td><td><input class="input" type="number" value="${x.pct}" onchange="editInv('${c}',${i},'pct',this.value)"></td><td><button class="btn light" onclick="delInv('${c}',${i})">Hapus</button></td></tr>`).join("")}</tbody></table><button class="btn blue noPrint" style="margin:9px 0 18px" onclick="addInv('${c}')">+ Tambah Investor</button>`).join("")}
function saveInv(){localStorage.setItem("MULIA_INVESTORS_V4",JSON.stringify(investors));render()}function editInv(c,i,k,v){investors[c][i][k]=k==="pct"?num(v):v;saveInv()}function addInv(c){investors[c].push({name:"Investor Baru",pct:0});saveInv()}function delInv(c,i){if(confirm("Hapus investor?")){investors[c].splice(i,1);saveInv()}}function showTab(n,b){["profit","monthly","invoice","audit","investor"].forEach(x=>$("tab-"+x).style.display=x===n?"block":"none");document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active")}
window.addEventListener("DOMContentLoaded",init);
</script></body></html>
